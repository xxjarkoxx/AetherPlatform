<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="etherealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Base gradient background -->
  <rect width="1920" height="1080" fill="url(#etherealGradient)"/>
  
  <!-- Ethereal light orbs -->
  <circle cx="300" cy="200" r="200" fill="url(#glow1)" opacity="0.6">
    <animate attributeName="cx" values="300;400;300" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;150;200" dur="8s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1600" cy="800" r="250" fill="url(#glow2)" opacity="0.5">
    <animate attributeName="cx" values="1600;1500;1600" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="800;850;800" dur="10s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="900" cy="400" r="150" fill="url(#glow1)" opacity="0.4">
    <animate attributeName="cx" values="900;950;900" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="400;450;400" dur="11s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1200" cy="600" r="180" fill="url(#glow2)" opacity="0.35">
    <animate attributeName="cx" values="1200;1150;1200" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="600;550;600" dur="9s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Smaller particles -->
  <circle cx="500" cy="700" r="80" fill="url(#glow1)" opacity="0.3">
    <animate attributeName="cx" values="500;550;500" dur="7s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1400" cy="300" r="100" fill="url(#glow2)" opacity="0.25">
    <animate attributeName="cy" values="300;350;300" dur="8s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="700" cy="900" r="90" fill="url(#glow1)" opacity="0.28">
    <animate attributeName="cx" values="700;750;700" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
